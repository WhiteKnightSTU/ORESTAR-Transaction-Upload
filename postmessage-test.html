<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>postMessage API Test</title>
<style>
  body { font-family: -apple-system, sans-serif; padding: 16px; font-size: 13px; }
  #log { white-space: pre-wrap; background: #f5f5f5; border: 1px solid #ccc; border-radius: 6px; padding: 10px; margin-top: 12px; font-family: ui-monospace, Consolas, monospace; font-size: 12px; }
  .ok { color: #1f7a3d; }
  .err { color: #c0392b; }
</style>
</head>
<body>

<h3>postMessage API Proxy Test</h3>
<div>This is a throwaway test page — not the real tool. Testing whether Manager responds to a specific message-based API request format.</div>
<div id="log">Waiting for test to run…</div>

<script>
const logEl = document.getElementById("log");
function log(msg, cls) {
  const line = document.createElement("div");
  if (cls) line.className = cls;
  line.textContent = `[${new Date().toISOString().slice(11,19)}] ${msg}`;
  logEl.appendChild(line);
}
logEl.textContent = "";

log(`Page loaded. In an iframe: ${window.self !== window.top}. URL: ${window.location.href}`);

async function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const t = setTimeout(() => {
      window.removeEventListener('message', onMessage);
      reject(new Error('Timed out waiting for Manager response (10s)'));
    }, 10000);
    function onMessage(e) {
      log(`Received message from origin ${e.origin}: ${JSON.stringify(e.data).slice(0, 200)}`);
      const d = e.data;
      if (d && d.type && d.type.endsWith('-response') && d.requestId === requestId) {
        clearTimeout(t);
        window.removeEventListener('message', onMessage);
        if (d.error) reject(new Error(d.error)); else resolve(d.body);
      }
    }
    window.addEventListener('message', onMessage);
    log(`Sending: ${JSON.stringify({ ...message, requestId })}`);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

async function managerApi(method, path, body) {
  return await postMessageWithResponse({ type: 'api-request', method, path, body: body ?? null });
}

(async () => {
  try {
    log("Testing /api4/businesses via postMessage protocol…");
    const businesses = await managerApi('GET', '/api4/businesses');
    log(`SUCCESS: ${JSON.stringify(businesses)}`, "ok");
  } catch (e) {
    log(`FAILED: ${e.message}`, "err");
  }

  try {
    log("Testing /api4/bank-or-cash-accounts via postMessage protocol…");
    const accounts = await managerApi('GET', '/api4/bank-or-cash-accounts?pageSize=5');
    log(`SUCCESS: ${JSON.stringify(accounts)}`, "ok");
  } catch (e) {
    log(`FAILED: ${e.message}`, "err");
  }

  log("Test complete. Copy everything above back for review.");
})();
</script>
</body>
</html>
